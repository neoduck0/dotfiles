################
### MONITORS ###
################

monitor=eDP-1,1920x1080@60,0x0,1
monitor=HDMI-A-1,1920x1080@60,0x-1080,1


###################
### MY PROGRAMS ###
###################

$terminal = ghostty --gtk-single-instance=true
$menu = rofi -show-icons -show drun
$filemanager = nautilus --new-window


#################
### AUTOSTART ###
#################

exec-once = exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
exec-once = bluetoothctl power off
exec-once = ghostty --gtk-single-instance=true --quit-after-last-window-closed=false --initial-window=false


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_THEME, Capitaine Cursors (Gruvbox) - White
env = HYPRCURSOR_SIZE, 24

env = XCURSOR_THEME, Capitaine Cursors (Gruvbox) - White
env = XCURSOR_SIZE, 24


#####################
### LOOK AND FEEL ###
#####################

general {
    border_size = 2 
    
    col.active_border = 0xffd4be98
    col.inactive_border = 0xff32302f

    allow_tearing = false

    layout = dwindle
}

decoration {
    shadow {
        enabled = false
    }

    blur {
        enabled = false 
    }
}

animations {
    enabled = no
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us, ara
    kb_options=grp:alt_shift_toggle

    follow_mouse = 2
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
    }

    tablet {
        output = eDP-1
    }
}

gestures {
    workspace_swipe = true
}


###################
### KEYBINDINGS ###
###################

$mod = SUPER

bindp = $mod, C, killactive,
bindp = $mod, E, exec, $filemanager
bindp = $mod, F, togglefloating
bindp = $mod, I, exec, $terminal
bindp = $mod, O, exec, $menu
bindp = $mod, P, pseudo,
bindp = $mod, S, exec, screenshot
bindp = $mod, U, togglesplit
bindp = $mod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bindp = $mod, Z, exec, hyprlock
bindp = $mod, backslash, exit,
bindp = $mod, space, exec, playerctl play-pause

bindp = $mod, A, submap, Audio
bindp = $mod, R, submap, Resize
bindp = $mod, D, submap, Display

bindp = $mod, H, movefocus, l
bindp = $mod, J, movefocus, d
bindp = $mod, K, movefocus, u
bindp = $mod, L, movefocus, r

bindp = $mod, 7, workspace, 7
bindp = $mod, 8, workspace, 8
bindp = $mod, 9, workspace, 9
bindp = $mod, 0, workspace, 10

bindp = $mod SHIFT, 7, movetoworkspace, 7
bindp = $mod SHIFT, 8, movetoworkspace, 8
bindp = $mod SHIFT, 9, movetoworkspace, 9
bindp = $mod SHIFT, 0, movetoworkspace, 10

bindpel = ,xf86monbrightnessup, exec, brightnessctl s 5%+
bindpel = ,xf86monbrightnessdown, exec, brightnessctl s 5%-

bindpel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindpel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindpl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindpl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindpl = , xf86audionext, exec, playerctl next
bindpl = , xf86audiopause, exec, playerctl play-pause
bindpl = , xf86audioplay, exec, playerctl play-pause
bindpl = , XF86AudioPrev, exec, playerctl previous

bindpm = $mod, mouse:272, movewindow
bindpm = $mod, mouse:273, resizewindow

submap = Audio
bindp = , H, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 1
bindep = , J, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-
bindep = , K, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindp = , L, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ 0
bindp = , escape, submap, reset
bindp = , catchall, exec, ""
submap = reset

submap = Display
bindp = , H, dpms, toggle eDP-1
bindep = , J, exec, brightnessctl s 5%-
bindep = , K, exec, brightnessctl s 5%+
bindp = , escape, submap, reset
bindp = , catchall, exec, ""
submap = reset

submap = Resize
bindep = , H, resizeactive, -40 0
bindep = , J, resizeactive, 0 40
bindep = , K, resizeactive, 0 -40
bindep = , L, resizeactive, 40 0
bindp = , escape, submap, reset
bindp = , catchall, exec, ""
submap = reset


##############################
### WINDOWS AND WORKSPACES ###
##############################

workspace = 7, default:true, monitor:eDP-1
workspace = 10, default:true, monitor:HDMI-A-1

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
